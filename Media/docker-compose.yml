services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      - TZ=America/Los_Angeles
    ports:
      - "8096:8096"
    volumes:
      - ./config/jellyfin:/config
      - ./cache/jellyfin:/cache
      - ./media:/media
    restart: unless-stopped
    networks:
      - media_streaming

  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    environment:
      - TZ=America/Los_Angeles
      - PLEX_CLAIM=claim-REPLACE_ME
      - ADVERTISE_IP=http://YOUR_SERVER_IP:32400/
    ports:
      - "32400:32400"
    volumes:
      - ./config/plex:/config
      - ./media:/media
    restart: unless-stopped
    networks:
      - media_streaming

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - TZ=America/Los_Angeles
      - LOG_LEVEL=info
    ports:
      - "5055:5055"
    volumes:
      - ./config/jellyseerr:/app/config
    restart: unless-stopped
    networks:
      - media_streaming

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    ports:
      - "8989:8989"
    volumes:
      - ./config/sonarr:/config
      - ./data:/data
      - ./media/tv:/tv
      - ./downloads:/downloads
    restart: unless-stopped
    networks:
      - media_streaming

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    ports:
      - "7878:7878"
    volumes:
      - ./config/radarr:/config
      - ./data:/data
      - ./media/movies:/movies
      - ./downloads:/downloads
    restart: unless-stopped
    networks:
      - media_streaming

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    ports:
      - "9696:9696"
    volumes:
      - ./config/prowlarr:/config
    restart: unless-stopped
    networks:
      - media_streaming

networks:
  media_streaming:
    driver: bridge